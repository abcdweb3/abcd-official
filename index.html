<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APAC BLOCKCHAIN DAY | BEYOND BORDERS</title>
    <link rel="icon" type="image/png" href="abcd_Logo_C.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background-color: #000; color: white; overflow-x: hidden; }
        .abcd-gradient { background: linear-gradient(90deg, #00C2FF 0%, #7000FF 30%, #FF007A 70%, #FF9900 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .beyond-borders { letter-spacing: 0.4em; background: linear-gradient(to right, #fff 20%, #666 50%, #fff 80%); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 4s linear infinite; line-height: 1.2; }
        @keyframes shine { to { background-position: 200% center; } }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        [data-lang]:not(.active) { display: none; }
    </style>
</head>
<body>
    <nav class="fixed w-full p-4 md:p-6 flex justify-between items-center z-50 backdrop-blur-md border-b border-white/5">
        <div class="flex items-center"><a href="/"><img src="abcd_Logo_C.png" alt="abcd Logo" class="h-6 md:h-8 w-auto"></a></div>
        <div class="flex items-center gap-4">
            <button onclick="toggleLanguage()" class="text-[10px] font-bold px-3 py-1 border border-white/10 rounded">
                <span id="lang-toggle-text">EN / 中</span>
            </button>
            <a href="https://linktr.ee/abcd.web3" target="_blank" class="px-5 py-2 bg-white text-black rounded-full text-[10px] font-bold uppercase">
                <span data-i18n="nav-community">Join Community</span>
            </a>
        </div>
    </nav>

    <section class="min-h-screen flex flex-col justify-center items-center px-6 text-center pt-32 pb-20">
        <div class="mb-6 inline-block px-4 py-1 border border-green-500/30 rounded-full text-[10px] tracking-[0.3em] text-green-400 uppercase font-bold">
            <span data-i18n="hero-tag">Mission Accomplished · Kuala Lumpur</span>
        </div>
        <h1 class="text-6xl md:text-9xl font-black tracking-tighter mb-4">APAC<br><span class="abcd-gradient">BLOCKCHAIN</span><br>DAY</h1>
        <span class="beyond-borders text-3xl md:text-6xl block mt-6 mb-12 font-black uppercase">BEYOND BORDERS</span>

        <div class="max-w-2xl glass-card p-8 rounded-3xl mb-12">
            <h2 class="text-2xl md:text-3xl font-bold mb-4" data-i18n="thank-you">THANK YOU FOR SHAPING THE FUTURE WITH US</h2>
            <p class="text-gray-400 text-sm md:text-base leading-relaxed" data-i18n="thank-desc">The Beyond Borders expedition in KL has successfully concluded. Stay tuned for our next destination.</p>
        </div>

        <div class="flex flex-col md:flex-row gap-4 w-full md:w-auto">
            <a href="https://x.com/abcd_web3_" target="_blank" class="px-12 py-5 bg-white text-black font-black rounded-full hover:scale-105 transition text-base uppercase">
                <span data-i18n="btn-follow">Follow Recap</span>
            </a>
            <a href="https://linktr.ee/abcd.web3" target="_blank" class="px-10 py-5 glass-card rounded-full font-bold text-xs tracking-widest text-gray-300">
                JOIN THE ECOSYSTEM
            </a>
        </div>
    </section>

    <script>
        const translations = {
            en: {
                "nav-community": "Join Community",
                "hero-tag": "Mission Accomplished · Kuala Lumpur",
                "thank-you": "THANK YOU FOR SHAPING THE FUTURE WITH US",
                "thank-desc": "The Beyond Borders expedition in KL has successfully concluded. Stay tuned for our next destination.",
                "btn-follow": "Follow Recap",
                "footer": "© 2026 APAC BLOCKCHAIN DAY. Connecting the APAC Web3 Ecosystem."
            },
            zh: {
                "nav-community": "加入社区",
                "hero-tag": "圆满收官 · 吉隆坡站",
                "thank-you": "感谢与我们共同定义未来",
                "thank-desc": "Beyond Borders 吉隆坡站活动已圆满结束，感谢所有参与者的支持。请期待我们的下一站旅程。",
                "btn-follow": "查看活动回顾",
                "footer": "© 2026 APAC BLOCKCHAIN DAY. 连接亚太 Web3 生态系统。"
            }
        };

        let currentLang = localStorage.getItem('abcd-lang') || 'en';
        function applyLanguage(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(translations[lang][key]) el.innerText = translations[lang][key];
            });
            document.getElementById('lang-toggle-text').innerText = lang === 'en' ? 'EN / 中' : '中 / EN';
            localStorage.setItem('abcd-lang', lang);
        }
        window.toggleLanguage = () => { currentLang = currentLang === 'en' ? 'zh' : 'en'; applyLanguage(currentLang); };
        applyLanguage(currentLang);
    </script>
</body>
</html>
