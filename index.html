<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APAC BLOCKCHAIN DAY | BEYOND BORDERS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap');
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #000; 
            color: white; 
            overflow-x: hidden; 
        }
        .abcd-gradient {
            background: linear-gradient(90deg, #00C2FF 0%, #7000FF 30%, #FF007A 70%, #FF9900 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .beyond-borders {
            letter-spacing: 0.4em;
            background: linear-gradient(to right, #fff 20%, #666 50%, #fff 80%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
            line-height: 1.2;
        }
        @keyframes shine {
            to { background-position: 200% center; }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* 强化倒计时尺寸 */
        .countdown-num {
            font-size: 3.5rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }
        @media (min-width: 768px) {
            .countdown-num { font-size: 5rem; }
        }
        @media (max-width: 768px) {
            .countdown-num { font-size: 2.2rem; }
            .beyond-borders { letter-spacing: 0.15em; }
        }
    </style>
</head>
<body>
    <div class="fixed top-0 left-0 w-full h-full -z-10">
        <div class="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] bg-indigo-600/15 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] bg-orange-600/10 blur-[120px] rounded-full"></div>
    </div>

    <nav class="fixed w-full p-4 md:p-6 flex justify-between items-center z-50 backdrop-blur-md border-b border-white/5">
        <div class="flex items-center">
            <a href="/">
                <img src="abcd_Logo_C.png" alt="abcd Logo" class="h-6 md:h-8 w-auto hover:opacity-80 transition">
            </a>
        </div>
        <div class="hidden md:flex gap-8 text-[10px] uppercase tracking-widest font-bold">
            <a href="https://x.com/abcd_web3_" target="_blank" class="hover:text-indigo-400 transition">Twitter (X)</a>
            <a href="https://linktr.ee/abcd.web3" target="_blank" class="hover:text-indigo-400 transition">Linktree</a>
        </div>
        <a href="https://luma.com/rf2wk90w" target="_blank" class="px-5 py-2 border border-white/20 rounded-full text-[10px] font-bold hover:bg-white hover:text-black transition uppercase relative overflow-hidden group">
            <span class="relative z-10">Register Now</span>
            <div class="absolute inset-0 bg-white scale-x-0 group-hover:scale-x-100 transition-transform origin-left"></div>
        </a>
    </nav>

    <section class="min-h-screen flex flex-col justify-center items-center px-6 text-center pt-28 pb-12">
        <div class="mb-6 inline-block px-4 py-1 border border-indigo-500/30 rounded-full text-[10px] tracking-[0.3em] text-indigo-400 uppercase font-bold animate-pulse">
            Upcoming Expedition in KL
        </div>

        <h1 class="text-6xl md:text-9xl font-black tracking-tighter mb-4 leading-[1.05] md:leading-none">
            APAC<br>
            <span class="abcd-gradient">BLOCKCHAIN</span><br>
            DAY
        </h1>

        <span class="beyond-borders text-3xl md:text-6xl block mt-6 mb-4 font-black uppercase">BEYOND BORDERS</span>

        <div class="mt-12 mb-16 flex gap-4 md:gap-14 justify-center items-end">
            <div class="flex flex-col">
                <span id="days" class="countdown-num abcd-gradient">00</span>
                <span class="text-[10px] md:text-xs uppercase tracking-[0.3em] text-gray-500 mt-3 font-bold">Days</span>
            </div>
            <div class="flex flex-col">
                <span id="hours" class="countdown-num text-white">00</span>
                <span class="text-[10px] md:text-xs uppercase tracking-[0.3em] text-gray-500 mt-3 font-bold">Hours</span>
            </div>
            <div class="flex flex-col">
                <span id="minutes" class="countdown-num text-white">00</span>
                <span class="text-[10px] md:text-xs uppercase tracking-[0.3em] text-gray-500 mt-3 font-bold">Mins</span>
            </div>
            <div class="flex flex-col text-indigo-500/40">
                <span id="seconds" class="countdown-num">00</span>
                <span class="text-[10px] md:text-xs uppercase tracking-[0.3em] text-gray-500 mt-3 font-bold font-mono">Secs</span>
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-4 w-full md:w-auto items-center">
            <a href="https://luma.com/rf2wk90w" target="_blank" class="w-full md:w-auto px-14 py-6 bg-white text-black font-black rounded-full hover:scale-105 transition shadow-[0_0_50px_rgba(255,255,255,0.25)] text-lg uppercase">
                Register Now
            </a>
            <div class="w-full md:w-auto px-10 py-6 glass-card rounded-full font-bold text-xs tracking-widest text-gray-300">
                APRIL 5 · 16:00 (GMT+8)
            </div>
        </div>
    </section>

    <footer class="py-12 text-center border-t border-white/5 px-6">
        <p class="text-gray-600 text-[10px] tracking-widest uppercase font-bold">
            © 2026 APAC BLOCKCHAIN DAY. Connecting the APAC Web3 Ecosystem.
        </p>
    </footer>

    <script>
        // 目标时间：2026年4月5日 16:00 (Kuala Lumpur GMT+8)
        const targetDate = new Date("April 5, 2026 16:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById("days").innerText = "00";
                document.getElementById("hours").innerText = "00";
                document.getElementById("minutes").innerText = "00";
                document.getElementById("seconds").innerText = "00";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
