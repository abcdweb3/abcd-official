<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>abcd | APAC BLOCKCHAIN SUMMIT @ NICE PATTAYA</title>
    
    <link rel="icon" type="image/png" href="abcd_Logo_C.png">
    <link rel="apple-touch-icon" href="abcd_Logo_C.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap');
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #000; 
            color: white; 
            overflow-x: hidden; 
        }
        .abcd-gradient {
            background: linear-gradient(90deg, #00C2FF 0%, #7000FF 30%, #FF007A 70%, #FF9900 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .beyond-borders {
            letter-spacing: 0.4em;
            background: linear-gradient(to right, #fff 20%, #666 50%, #fff 80%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
            line-height: 1.2;
        }
        @keyframes shine {
            to { background-position: 200% center; }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .countdown-num {
            font-size: 3.5rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }
        @media (min-width: 768px) { .countdown-num { font-size: 5rem; } }

        /* 合作伙伴走马灯样式 */
        .marquee-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            padding: 20px 0;
        }
        .marquee-container::before, .marquee-container::after {
            content: "";
            position: absolute;
            top: 0;
            width: 150px;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        .marquee-container::before { left: 0; background: linear-gradient(to right, #000, transparent); }
        .marquee-container::after { right: 0; background: linear-gradient(to left, #000, transparent); }
        .marquee-track {
            display: flex;
            width: max-content;
            gap: 40px;
            padding: 10px 0;
            animation: scroll 45s linear infinite;
        }
        .marquee-track.reverse { animation: scroll-reverse 45s linear infinite; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
        @keyframes scroll-reverse { from { transform: translateX(-50%); } to { transform: translateX(0); } }
        .partner-wrapper { display: flex; align-items: center; justify-content: center; width: 140px; height: 80px; flex-shrink: 0; }
        .partner-img { max-height: 50px; max-width: 110px; opacity: 0.4; filter: grayscale(100%); transition: 0.4s; }
        .partner-wrapper:hover .partner-img { opacity: 1; filter: grayscale(0%); transform: scale(1.15); }
    </style>
</head>
<body>
    <div class="fixed top-0 left-0 w-full h-full -z-10">
        <div class="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] bg-orange-500/10 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] bg-indigo-600/15 blur-[120px] rounded-full"></div>
    </div>

    <nav class="fixed w-full p-4 md:p-6 flex justify-between items-center z-50 backdrop-blur-md border-b border-white/5">
        <div class="flex items-center">
            <a href="/"><img src="abcd_Logo_C.png" alt="abcd Logo" class="h-6 md:h-8 w-auto"></a>
        </div>
        <div class="flex items-center gap-4 md:gap-8">
            <button onclick="toggleLanguage()" class="text-[10px] font-bold tracking-widest px-3 py-1 border border-white/10 rounded hover:bg-white/5 transition">
                <span id="lang-toggle-text">EN / 中</span>
            </button>
            <a href="https://linktr.ee/abcd.web3" target="_blank" class="px-5 py-2 bg-white text-black rounded-full text-[10px] font-bold hover:bg-white transition uppercase">
                <span data-i18n="nav-community">Get Tickets</span>
            </a>
        </div>
    </nav>

    <section class="min-h-screen flex flex-col justify-center items-center px-6 text-center pt-32 pb-20">
        <div class="mb-6 inline-block px-4 py-1 border border-orange-500/30 rounded-full text-[10px] tracking-[0.3em] text-orange-400 uppercase font-bold animate-pulse">
            <span data-i18n="hero-tag">Pattaya, Thailand · NICE Convention Center</span>
        </div>
        
        <h1 class="text-6xl md:text-9xl font-black tracking-tighter mb-4 leading-[1.05] md:leading-none">
            APAC<br><span class="abcd-gradient">SUMMIT</span><br>2027
        </h1>
        <span class="beyond-borders text-3xl md:text-6xl block mt-6 mb-12 font-black uppercase">BEYOND BORDERS</span>

        <div class="mt-8 mb-16 flex gap-4 md:gap-14 justify-center items-end text-center">
            <div class="flex flex-col"><span id="days" class="countdown-num abcd-gradient">00</span><span class="text-[9px] md:text-xs uppercase tracking-[0.3em] text-gray-500 mt-3 font-bold" data-i18n="count-days">Days</span></div>
            <div class="flex flex-col"><span id="hours" class="countdown-num text-white">00</span><span class="text-[9px] md:text-xs uppercase tracking-[0.3em] text-gray-500 mt-3 font-bold" data-i18n="count-hours">Hours</span></div>
            <div class="flex flex-col"><span id="minutes" class="countdown-num text-white">00</span><span class="text-[9px] md:text-xs uppercase tracking-[0.3em] text-gray-500 mt-3 font-bold" data-i18n="count-mins">Mins</span></div>
            <div class="flex flex-col text-indigo-500/40"><span id="seconds" class="countdown-num">00</span><span class="text-[9px] md:text-xs uppercase tracking-[0.3em] text-gray-500 mt-3 font-bold" data-i18n="count-secs">Secs</span></div>
        </div>

        <div class="flex flex-col md:flex-row gap-4 w-full md:w-auto items-center">
            <a href="#" class="w-full md:w-auto px-14 py-6 bg-white text-black font-black rounded-full hover:scale-105 transition shadow-[0_0_50px_rgba(255,255,255,0.25)] text-lg uppercase">
                <span data-i18n="btn-reg">Book Now</span>
            </a>
            <div class="w-full md:w-auto px-10 py-6 glass-card rounded-full font-bold text-xs tracking-widest text-gray-300 uppercase">
                <span data-i18n="event-date">APRIL 27-28 · PATTAYA</span>
            </div>
        </div>
    </section>

    <section class="py-20 bg-black/50">
        <div class="text-center mb-12">
            <h2 class="text-2xl md:text-4xl font-bold uppercase tracking-widest abcd-gradient inline-block" data-i18n="partner-title">Summit Partners</h2>
        </div>
        <div class="marquee-container">
            <div class="marquee-track" id="row1"></div>
            <div class="marquee-track reverse" id="row2"></div>
        </div>
    </section>

    <footer class="py-12 text-center border-t border-white/5 px-6">
        <p class="text-gray-600 text-[10px] tracking-widest uppercase font-bold" data-i18n="footer">
            © 2027 ABCD SUMMIT. Nong Nooch International Convention and Exhibition Center.
        </p>
    </footer>

    <script type="module">
        import { partners } from './partnersData.js';

        const translations = {
            en: {
                "nav-community": "Get Tickets", 
                "hero-tag": "Pattaya, Thailand · NICE Convention Center",
                "btn-reg": "Book Now",
                "count-days": "Days", "count-hours": "Hours", "count-mins": "Mins", "count-secs": "Secs",
                "event-date": "APRIL 27-28 · PATTAYA",
                "partner-title": "Summit Partners",
                "footer": "© 2027 ABCD SUMMIT. Nong Nooch International Convention and Exhibition Center (NICE)."
            },
            zh: {
                "nav-community": "获取门票", 
                "hero-tag": "泰国 · 芭提雅 · NICE 国际会展中心",
                "btn-reg": "立即预定",
                "count-days": "天", "count-hours": "时", "count-mins": "分", "count-secs": "秒",
                "event-date": "4月27-28日 · 芭提雅",
                "partner-title": "峰会合作伙伴",
                "footer": "© 2027 ABCD SUMMIT. 芭提雅东芭乐园国际会议中心 (NICE)."
            }
        };

        let currentLang = localStorage.getItem('abcd-lang') || 'en';

        window.applyLanguage = function(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(translations[lang][key]) el.innerText = translations[lang][key];
            });
            document.getElementById('lang-toggle-text').innerText = lang === 'en' ? 'EN / 中' : '中 / EN';
            localStorage.setItem('abcd-lang', lang);
        }

        window.toggleLanguage = function() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            applyLanguage(currentLang);
        }

        applyLanguage(currentLang);

        // 合作伙伴渲染逻辑（保持一致）
        const row1 = document.getElementById('row1');
        const row2 = document.getElementById('row2');
        const midpoint = Math.ceil(partners.length / 2);
        const set1 = partners.slice(0, midpoint);
        const set2 = partners.slice(midpoint);

        function renderLogos(container, data) {
            const displayData = data.length > 0 ? [...data, ...data, ...data, ...data] : []; 
            container.innerHTML = displayData.map(p => `
                <div class="partner-wrapper">
                    <img src="${p.logo}" alt="${p.name}" class="partner-img">
                </div>
            `).join('');
        }
        renderLogos(row1, set1); renderLogos(row2, set2);

        // 倒计时逻辑：目标 4月27日
        const targetDate = new Date("April 27, 2027 09:00:00").getTime();
        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;
            if (distance < 0) return;
            document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById("minutes").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById("seconds").innerText = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }
        setInterval(updateCountdown, 1000); updateCountdown();
    </script>
</body>
</html>
